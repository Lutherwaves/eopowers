name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude-plugin/marketplace.json'
      - '.claude-plugin/plugin.json'
      - 'package.json'
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version and generate changelog
        id: release
        run: python3 .github/scripts/release.py

      - name: Commit, tag, and push
        if: steps.release.outputs.new_version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json .claude-plugin/plugin.json .claude-plugin/marketplace.json CHANGELOG.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(release): v${{ steps.release.outputs.new_version }}"
          git tag "v${{ steps.release.outputs.new_version }}"
          git push
          git push --tags

      - name: Create GitHub Release
        if: steps.release.outputs.new_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.release.outputs.new_version }}" \
            --title "v${{ steps.release.outputs.new_version }}" \
            --notes-file /tmp/release_notes.md
