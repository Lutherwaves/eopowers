name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude-plugin/marketplace.json'
      - '.claude-plugin/plugin.json'
      - 'package.json'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        run: |
          python3 -c "
          import json

          for f in ['.claude-plugin/marketplace.json', '.claude-plugin/plugin.json', 'package.json']:
              with open(f) as fh:
                  data = json.load(fh)

              if 'plugins' in data:
                  v = data['plugins'][0]['version']
              else:
                  v = data['version']

              parts = v.split('.')
              parts[2] = str(int(parts[2]) + 1)
              new_v = '.'.join(parts)

              if 'plugins' in data:
                  data['plugins'][0]['version'] = new_v
              else:
                  data['version'] = new_v

              with open(f, 'w') as fh:
                  json.dump(data, fh, indent=2, ensure_ascii=False)
                  fh.write('\n')

          print(f'Bumped {v} -> {new_v}')
          with open('VERSION', 'w') as f:
              f.write(new_v)
          "

      - name: Commit and tag
        run: |
          VERSION=$(cat VERSION)
          rm VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json .claude-plugin/plugin.json package.json
          git diff --cached --quiet && echo "No version change" && exit 0
          git commit -m "chore: bump version to v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags
